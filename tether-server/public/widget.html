<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Music Widget Overlay</title>
    <!-- Google Fonts Anbindung für die dynamischen Schriftarten -->
    <link id="preset-fonts" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Montserrat:wght@300;400;600;700;800&family=Poppins:wght@300;400;600;700;800&family=Roboto+Mono:wght@400;600;700&family=Rubik:wght@300;400;600;700;800&family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    
    <style id="custom-font-base64-style">
        /* Für hochgeladene Base64-Fonts falls im Editor genutzt */
    </style>

    <style id="widget-styles">
        /* Grundlegendes CSS für die Positionierung und den Standard-Look */
        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        /* DYNAMIC GRAPHIC GLOW WRAPPER (Glow-Effekt hinter dem Widget) */
        .widget-viewport {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #widget-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            will-change: filter, transform;
            border-radius: inherit; /* Wird via JS synchronisiert */
        }

        /* Das Haupt-Widget */
        #widget {
            display: flex;
            align-items: center;
            gap: 20px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            z-index: 2; /* Liegt über dem Glow */
            width: 420px; /* Standard, wird dynamisch überschrieben */
            transition: all 0.3s ease-out;
        }

        /* Cover-Art & Vinyl */
        .cover-container {
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cover {
            object-fit: cover;
            width: 100%;
            height: 100%;
            display: block;
            transition: border-radius 0.3s ease;
        }

        /* Vinyl Spin Loch */
        .vinyl-center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16%;
            height: 16%;
            background-color: #111;
            border-radius: 50%;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.4);
            display: none;
            z-index: 5;
        }

        /* Text Details */
        .text-details {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            min-width: 0;
        }

        /* Marquee / Auto-Scroll System */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            white-space: nowrap;
        }

        .marquee-content {
            display: inline-block;
            padding-right: 50px;
            will-change: transform;
        }

        #title, #artist {
            margin: 0;
            padding: 2px 0;
            display: block;
        }

        @keyframes scrollText {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-50%, 0, 0); }
        }

        .scrolling-active {
            animation: scrollText var(--marquee-speed, 12s) linear infinite;
        }

        #separator {
            width: 100%;
            margin: 8px 0;
            border: none;
            transition: all 0.3s ease;
        }

        /* Progress-Bar */
        .progress-container {
            width: 100%;
            margin-top: 8px;
        }

        .progress-time-display {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            margin-bottom: 3px;
        }

        .progress-bar-bg {
            background-color: rgba(255, 255, 255, 0.15);
            height: 5px;
            border-radius: 10px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.2s linear;
        }

        /* Rotation Animation für das Album Cover */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning {
            animation: spin var(--vinyl-speed, 8s) linear infinite !important;
        }
    </style>
</head>
<body>

<div class="widget-viewport">
    <!-- Glow Effekt hinter dem Widget -->
    <div id="widget-glow"></div>

    <!-- Das eigentliche Musik-Widget -->
    <div id="widget">
        <!-- Cover Art Bereich -->
        <div class="cover-container" id="cover-container">
            <img id="cover" src="https://via.placeholder.com/150" alt="Cover Art">
            <div class="vinyl-center-hole" id="vinyl-hole"></div>
        </div>

        <!-- Text details & Progress -->
        <div class="text-details">
            <!-- Titel -->
            <div class="marquee-container">
                <div class="marquee-content" id="title-marquee">
                    <span id="title">Kein Song aktiv</span>
                </div>
            </div>

            <!-- Separator Trennlinie -->
            <hr id="separator">

            <!-- Interpret -->
            <div class="marquee-container">
                <div class="marquee-content" id="artist-marquee">
                    <span id="artist">Musik-Server bereit</span>
                </div>
            </div>

            <!-- Progress Bar & Zeiten -->
            <div class="progress-container" id="progress-container">
                <div class="progress-time-display" id="progress-timers">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ─── WebSocket-Verbindung ────────────────────────────────────────────────
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws`;
    let ws = new WebSocket(wsUrl);

    let progressInterval = null;
    let songPosition = 0;
    let songDuration = 0;
    let isPaused = true;

    // Beim Start: gespeicherte Config direkt per HTTP laden
    fetch('/api/overlay-config')
        .then(r => r.json())
        .then(cfg => applyWidgetDesign(cfg))
        .catch(() => {});

    // Verbindung bei Abbruch wiederherstellen
    function connect() {
        ws.onopen = () => console.log('Widget mit Server verbunden!');
        
        ws.onmessage = (event) => {
            try {
                const message = JSON.parse(event.data);
                
                // 1. Wenn ein neuer Song gespielt wird oder sich der Fortschritt ändert
                if (message.type === 'songchange' || message.type === 'progress') {
                    updateWidgetData(message.data);
                }
                
                // 2. Wenn eine neue Styling-Konfiguration vom Editor kommt
                if (message.type === 'config_update') {
                    applyWidgetDesign(message.config);
                }
            } catch (e) {
                console.error("Fehler beim WS-Parsing:", e);
            }
        };

        ws.onclose = () => {
            console.log('WS getrennt. Erneuter Verbindungsaufbau in 3s...');
            setTimeout(() => {
                ws = new WebSocket(wsUrl);
                connect();
            }, 3000);
        };
    }
    connect();

    // ─── Songdaten & Timer aktualisieren ──────────────────────────────────────
    function updateWidgetData(data) {
        if (!data) return;

        // Cover-Bild
        const coverEl = document.getElementById('cover');
        if (data.imageUrl && coverEl.src !== data.imageUrl) {
            coverEl.src = data.imageUrl;
        } else if (!data.imageUrl) {
            coverEl.src = 'https://via.placeholder.com/150';
        }

        // Titel und Interpret setzen
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        
        if (titleEl.textContent !== data.title) {
            titleEl.textContent = data.title || 'Unbekannter Titel';
            checkMarqueeScroll(document.getElementById('title-marquee'), titleEl);
        }
        if (artistEl.textContent !== data.artist) {
            artistEl.textContent = data.artist || 'Unbekannter Künstler';
            checkMarqueeScroll(document.getElementById('artist-marquee'), artistEl);
        }

        // Progress Timings synchronisieren
        songPosition = data.position || 0;
        songDuration = data.duration || 0;
        isPaused = data.isPaused !== false;

        // Vinyl Rotation – nur drehen wenn coverSpin im Design aktiv ist
        const coverImgEl = document.getElementById('cover');
        if (isPaused || coverImgEl.dataset.spinEnabled !== 'true') {
            coverImgEl.classList.remove('spinning');
        } else {
            coverImgEl.classList.add('spinning');
        }

        updateProgressBar();

        // Interner Ticker für flüssigen Zeitfortschritt
        clearInterval(progressInterval);
        if (!isPaused && songDuration > 0) {
            progressInterval = setInterval(() => {
                songPosition += 1000;
                if (songPosition > songDuration) songPosition = songDuration;
                updateProgressBar();
            }, 1000);
        }
    }

    function formatTime(ms) {
        if (isNaN(ms) || ms < 0) return '00:00';
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function updateProgressBar() {
        const percent = songDuration > 0 ? (songPosition / songDuration) * 100 : 0;
        document.getElementById('progress-fill').style.width = `${percent}%`;
        
        document.getElementById('time-current').textContent = formatTime(songPosition);
        document.getElementById('time-total').textContent = formatTime(songDuration);
    }

    // Automatische Laufschrift bei zu langem Text
    function checkMarqueeScroll(container, content) {
        container.classList.remove('scrolling-active');
        if (content.offsetWidth > container.parentElement.offsetWidth) {
            container.classList.add('scrolling-active');
        }
    }

    // ─── HILFSFUNKTIONEN (identisch mit Editor) ───────────────────────────────

    function hexToRgba(hex, opacity) {
        if (!hex) return `rgba(255,255,255,${opacity !== undefined ? opacity : 1})`;
        hex = hex.trim().replace('#', '');
        if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
        const r = parseInt(hex.slice(0, 2), 16) || 0;
        const g = parseInt(hex.slice(2, 4), 16) || 0;
        const b = parseInt(hex.slice(4, 6), 16) || 0;
        return `rgba(${r}, ${g}, ${b}, ${opacity !== undefined ? opacity : 1})`;
    }

    // Konvertiert das gradients-Objekt (Stop-Daten) in einen CSS-Gradient-Stop-String
    function stopsToCSS(stopsArr, defaultOpacity) {
        if (!stopsArr || stopsArr.length === 0) return null;
        const sorted = [...stopsArr].sort((a, b) => a.position - b.position);
        return sorted.map(s => {
            const hex = s.color.replace('#', '');
            const r = parseInt(hex.slice(0, 2), 16) || 0;
            const g = parseInt(hex.slice(2, 4), 16) || 0;
            const b = parseInt(hex.slice(4, 6), 16) || 0;
            const finalAlpha = (s.opacity !== undefined ? s.opacity : 1) * (defaultOpacity !== undefined ? defaultOpacity : 1);
            return `rgba(${r}, ${g}, ${b}, ${finalAlpha}) ${s.position}%`;
        }).join(', ');
    }

    // Gibt den fertigen CSS-Gradient-String zurück (aus gradients-Objekt oder vorgefertigtem String)
    function getGradientCSS(c, key, type, direction, opacity) {
        // Zuerst: Falls der Editor bereits einen fertigen Stop-String mitgeliefert hat (neues Format)
        const prebuilt = c[key + 'CSS'];
        if (prebuilt) return prebuilt;
        // Fallback: aus dem gradients-Objekt selbst berechnen
        if (c.gradients && c.gradients[key] && c.gradients[key].stops) {
            const stops = stopsToCSS(c.gradients[key].stops, opacity);
            if (!stops) return null;
            if (type === 'radial') return `radial-gradient(circle, ${stops})`;
            return `linear-gradient(${direction}, ${stops})`;
        }
        return null;
    }

    // ─── DAS GANZE DESIGN VOM EDITOR ANWENDEN (1:1 Editor-Logik) ─────────────
    function applyWidgetDesign(c) {
        if (!c) return;

        const w          = document.getElementById('widget');
        const glowEl     = document.getElementById('widget-glow');
        const cover      = document.getElementById('cover');
        const cContainer = document.getElementById('cover-container');
        const vinylHole  = document.getElementById('vinyl-hole');
        const sep        = document.getElementById('separator');
        const pFill      = document.getElementById('progress-fill');
        const pContainer = document.getElementById('progress-container');
        const pTimers    = document.getElementById('progress-timers');
        const title      = document.getElementById('title');
        const artist     = document.getElementById('artist');

        // Bool-Helper: buildConfig() liefert echte Booleans, overlay_config.json Strings
        const bool = v => v === true || v === 'true';

        // ── 1. Font ───────────────────────────────────────────────────────────
        const fontMode = c.fontEngineMode || 'google';
        if (fontMode === 'google') {
            const fontName = (c.customFontName || 'Inter').trim();
            const linkId = 'dynamic-widget-font';
            let link = document.getElementById(linkId);
            if (!link) {
                link = document.createElement('link');
                link.id = linkId;
                link.rel = 'stylesheet';
                document.head.appendChild(link);
            }
            link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fontName)}:wght@300;400;600;700;800&display=swap`;
            w.style.fontFamily = `'${fontName}', sans-serif`;
        } else if (c.cached_local_font) {
            const fontObj = typeof c.cached_local_font === 'string' ? JSON.parse(c.cached_local_font) : c.cached_local_font;
            const styleEl = document.getElementById('custom-font-base64-style');
            styleEl.innerHTML = `@font-face { font-family: '${fontObj.name}'; src: url('${fontObj.data}') format('${fontObj.type}'); }`;
            w.style.fontFamily = `'${fontObj.name}', sans-serif`;
        }

        // ── 2. Dimensionen & Padding ──────────────────────────────────────────
        w.style.width   = (c.widgetWidth  || 420) + 'px';
        w.style.padding = (c.widgetPadding || 20) + 'px';

        if (bool(c.widgetHeightAuto)) {
            w.style.height = 'auto';
            if (glowEl) glowEl.style.height = w.offsetHeight + 'px';
        } else {
            const h = (c.widgetHeight || 120) + 'px';
            w.style.height = h;
            if (glowEl) glowEl.style.height = h;
        }
        if (glowEl) glowEl.style.width = (c.widgetWidth || 420) + 'px';

        // ── 3. Ecken-Radien ───────────────────────────────────────────────────
        const tl = (c.tlRadius || 16) + 'px';
        const tr = (c.trRadius || 16) + 'px';
        const bl = (c.blRadius || 16) + 'px';
        const br = (c.brRadius || 16) + 'px';
        const radiusStr = `${tl} ${tr} ${br} ${bl}`;
        w.style.borderRadius = radiusStr;
        if (glowEl) glowEl.style.borderRadius = radiusStr;

        // ── 4. Hintergrund ────────────────────────────────────────────────────
        const bgType = c.bgType || 'solid';
        const bgOp   = parseFloat(c.bgOpacity !== undefined ? c.bgOpacity : 1);
        if (bgType === 'solid') {
            const bgAlpha = parseFloat(c.bgColorAlpha !== undefined ? c.bgColorAlpha : 1);
            w.style.background = hexToRgba(c.bgColor || '#0a0a0c', bgAlpha * bgOp);
        } else {
            const bgDir  = c.bgDirection || 'to right';
            const bgCSS  = getGradientCSS(c, 'background', bgType, bgDir, bgOp);
            if (bgCSS) w.style.background = bgCSS;
        }

        // ── 5. Glow/Shadow ────────────────────────────────────────────────────
        if (bool(c.showShadow)) {
            if (glowEl) glowEl.style.display = 'block';
            const glowBlur = (c.glowBlur || 25) + 'px';
            const glowType = c.glowType || 'solid';

            if (glowType === 'solid') {
                const glowAlpha = parseFloat(c.glowColorAlpha !== undefined ? c.glowColorAlpha : 0.4);
                if (glowEl) glowEl.style.background = hexToRgba(c.glowColor || '#1db954', glowAlpha);
            } else if (glowType === 'custom-gradient') {
                const glowDir = c.glowDirection || 'to right';
                const glowCSS = getGradientCSS(c, 'glow', 'linear', glowDir, 1);
                if (glowCSS && glowEl) glowEl.style.background = glowCSS;
            } else {
                // 'gradient' = Hintergrund-Gradient spiegeln
                const bgDir = c.bgDirection || 'to right';
                const bgType2 = c.bgType || 'solid';
                const bgOp2 = parseFloat(c.bgOpacity !== undefined ? c.bgOpacity : 1);
                if (bgType2 === 'solid') {
                    const bgAlpha = parseFloat(c.bgColorAlpha !== undefined ? c.bgColorAlpha : 1);
                    if (glowEl) glowEl.style.background = hexToRgba(c.bgColor || '#0a0a0c', bgAlpha * bgOp2);
                } else {
                    const bgCSS = getGradientCSS(c, 'background', bgType2, bgDir, bgOp2);
                    if (bgCSS && glowEl) glowEl.style.background = bgCSS;
                }
            }
            if (glowEl) {
                glowEl.style.filter    = `blur(${glowBlur})`;
                glowEl.style.transform = `scale(1) translate(0px, 0px) rotate(0deg)`;
            }
        } else {
            if (glowEl) glowEl.style.display = 'none';
        }

        // ── 6. Border ─────────────────────────────────────────────────────────
        const borderActive = bool(c.borderActive);
        if (borderActive) {
            const bWidth = (c.borderWidth || 2) + 'px';
            const borderType = c.borderType || 'solid';
            w.style.borderWidth = bWidth;
            w.style.borderStyle = 'solid';
            if (borderType === 'solid') {
                const bAlpha = parseFloat(c.borderColorAlpha !== undefined ? c.borderColorAlpha : 1);
                w.style.borderColor = hexToRgba(c.borderColor || '#1db954', bAlpha);
                w.style.borderImage = 'none';
            } else {
                const bDir  = c.borderDirection || 'to right';
                const bCSS  = getGradientCSS(c, 'border', 'linear', bDir, 1);
                if (bCSS) w.style.borderImage = `${bCSS} 1`;
            }
        } else {
            w.style.border      = '1px solid transparent';
            w.style.borderImage = 'none';
        }

        // ── 7. Cover / Vinyl ──────────────────────────────────────────────────
        const coverSize  = c.coverSize  || 80;
        const cRadius    = c.ctlRadius  || 10;
        const spinActive = bool(c.coverSpin);
        const holeActive = bool(c.vinylHole);

        cContainer.style.width  = coverSize + 'px';
        cContainer.style.height = coverSize + 'px';
        cover.style.width       = coverSize + 'px';
        cover.style.height      = coverSize + 'px';

        // data-Attribut für den isPaused-Handler
        cover.dataset.spinEnabled = spinActive ? 'true' : 'false';

        if (spinActive) {
            cover.style.setProperty('--vinyl-speed', (c.vinylSpeed || 8) + 's');
            cover.style.borderRadius     = '50%';
            cContainer.style.borderRadius = '50%';
            vinylHole.style.display      = holeActive ? 'block' : 'none';
            if (!isPaused) cover.classList.add('spinning');
        } else {
            cover.classList.remove('spinning');
            cover.style.borderRadius      = cRadius + 'px';
            cContainer.style.borderRadius = cRadius + 'px';
            vinylHole.style.display       = 'none';
        }

        // ── 8. Text: Titel ────────────────────────────────────────────────────
        title.style.fontSize = (c.fontSizeTitle || 18) + 'px';

        const titleGradActive = bool(c.titleGradientActive);
        title.style.webkitBackgroundClip = 'unset';
        title.style.webkitTextFillColor  = 'unset';
        title.style.background           = 'none';

        if (titleGradActive) {
            const titleAngle = (c.titleGradAngle || 90) + 'deg';
            const titleCSS   = getGradientCSS(c, 'title', 'linear', titleAngle, 1);
            if (titleCSS) {
                title.style.background           = titleCSS;
                title.style.webkitBackgroundClip = 'text';
                title.style.webkitTextFillColor  = 'transparent';
            }
        } else {
            const tAlpha = parseFloat(c.textColorAlpha !== undefined ? c.textColorAlpha : 1);
            title.style.color = hexToRgba(c.textColor || '#ffffff', tAlpha);
        }

        // ── 9. Text: Artist ───────────────────────────────────────────────────
        artist.style.fontSize = (c.fontSizeArtist || 14) + 'px';

        const artistGradActive = bool(c.artistGradientActive);
        artist.style.webkitBackgroundClip = 'unset';
        artist.style.webkitTextFillColor  = 'unset';
        artist.style.background           = 'none';

        if (artistGradActive) {
            const artistAngle = (c.artistGradAngle || 90) + 'deg';
            const artistCSS   = getGradientCSS(c, 'artist', 'linear', artistAngle, 1);
            if (artistCSS) {
                artist.style.background           = artistCSS;
                artist.style.webkitBackgroundClip = 'text';
                artist.style.webkitTextFillColor  = 'transparent';
            }
        } else {
            const aAlpha = parseFloat(c.artistColorAlpha !== undefined ? c.artistColorAlpha : 1);
            artist.style.color = hexToRgba(c.artistColor || '#9ca3af', aAlpha);
        }

        // ── 10. Text Stroke (gilt für Titel + Artist) ──────────────────────────
        const strokeActive = bool(c.textStrokeActive);
        if (strokeActive) {
            const sw        = (c.textStrokeWidth || 1) + 'px';
            const strokeType = c.textStrokeType || 'solid';
            if (strokeType === 'solid') {
                const sAlpha = parseFloat(c.textStrokeColorAlpha !== undefined ? c.textStrokeColorAlpha : 1);
                const sColor = hexToRgba(c.textStrokeColor || '#000000', sAlpha);
                title.style.webkitTextStroke  = `${sw} ${sColor}`;
                artist.style.webkitTextStroke = `${sw} ${sColor}`;
            } else {
                const strokeDir = c.strokeDirection || 'to right';
                const strokeCSS = getGradientCSS(c, 'stroke', 'linear', strokeDir, 1);
                title.style.webkitTextStroke  = `${sw} transparent`;
                artist.style.webkitTextStroke = `${sw} transparent`;
                if (strokeCSS) {
                    title.style.backgroundImage  = strokeCSS;
                    artist.style.backgroundImage = strokeCSS;
                }
            }
        } else {
            title.style.webkitTextStroke  = 'unset';
            artist.style.webkitTextStroke = 'unset';
        }

        // ── 11. Text Shadow (gilt für Titel + Artist) ──────────────────────────
        const shadowActive = bool(c.fontShadow);
        if (shadowActive) {
            const sX     = (c.shadowX    || 1) + 'px';
            const sY     = (c.shadowY    || 1) + 'px';
            const sB     = (c.shadowBlur || 3) + 'px';
            const sAlpha = parseFloat(c.textShadowColorAlpha !== undefined ? c.textShadowColorAlpha : 0.6);
            const sColor = hexToRgba(c.textShadowColor || '#000000', sAlpha);
            const rule   = `${sX} ${sY} ${sB} ${sColor}`;
            title.style.textShadow  = rule;
            artist.style.textShadow = rule;
        } else {
            title.style.textShadow  = 'unset';
            artist.style.textShadow = 'unset';
        }

        // ── 12. Separator ──────────────────────────────────────────────────────
        if (bool(c.showSeparator) || c.showSeparator === undefined) {
            sep.style.display = 'block';
            sep.style.height  = (c.separatorHeight || 1) + 'px';
            sep.style.border  = 'none';
            const sepType = c.separatorType || 'solid';
            if (sepType === 'solid') {
                const sAlpha = parseFloat(c.separatorColorAlpha !== undefined ? c.separatorColorAlpha : 1);
                sep.style.background = hexToRgba(c.separatorColor || '#1f2937', sAlpha);
            } else {
                const sepDir = c.sepDirection || 'to right';
                const sepCSS = getGradientCSS(c, 'sep', 'linear', sepDir, 1);
                if (sepCSS) sep.style.background = sepCSS;
            }
        } else {
            sep.style.display = 'none';
        }

        // ── 13. Progress Bar & Timer ──────────────────────────────────────────
        const showProgress = bool(c.showProgressBar) || c.showProgressBar === undefined;
        if (showProgress) {
            pContainer.style.display = 'block';
            const pType = c.progressBarType || 'solid';
            if (pType === 'solid') {
                const pAlpha = parseFloat(c.accentColorAlpha !== undefined ? c.accentColorAlpha : 1);
                pFill.style.background = hexToRgba(c.accentColor || '#1db954', pAlpha);
            } else {
                const pDir = c.progressDirection || 'to right';
                const pCSS = getGradientCSS(c, 'progress', 'linear', pDir, 1);
                if (pCSS) pFill.style.background = pCSS;
            }
            // Progress-Bar-Hintergrund
            const pBgEl = document.querySelector('.progress-bar-bg');
            if (pBgEl && c.progressBgColor) {
                const pBgAlpha = parseFloat(c.progressBgColorAlpha !== undefined ? c.progressBgColorAlpha : 0.15);
                pBgEl.style.backgroundColor = hexToRgba(c.progressBgColor, pBgAlpha);
            }
            // Timer anzeigen/verstecken
            if (c.timeDisplayMode === 'hide') {
                pTimers.style.display = 'none';
            } else {
                pTimers.style.display = 'flex';
                const aAlpha = parseFloat(c.artistColorAlpha !== undefined ? c.artistColorAlpha : 1);
                pTimers.style.color = hexToRgba(c.artistColor || '#9ca3af', aAlpha * 0.8);
            }
        } else {
            pContainer.style.display = 'none';
        }
    }
</script>
</body>
</html>
